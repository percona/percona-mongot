# MongoDB-managed embedding model configurations for Community Edition
# Note: Each model is automatically compatible with itself. The compatibleModels field
# only needs to list OTHER models that are compatible for query-time model override.
configs:
  - modelName: voyage-4-large
    embeddingProvider: VOYAGE
    # voyage-4 family models are all interchangeable for query-time override
    compatibleModels:
      - voyage-4
      - voyage-4-lite
    config:
      modelConfig:
        batchSize: 1000
        batchTokenLimit: 120000
        outputDimensions: 1024
        quantization: float
      errorHandlingConfig:
        maxRetries: 50
        initialRetryWaitMs: 200
        maxRetryWaitMs: 10000
        jitter: 0.1

  - modelName: voyage-4
    embeddingProvider: VOYAGE
    compatibleModels:
      - voyage-4-large
      - voyage-4-lite
    config:
      modelConfig:
        batchSize: 1000
        batchTokenLimit: 320000
        outputDimensions: 1024
        quantization: float
      errorHandlingConfig:
        maxRetries: 50
        initialRetryWaitMs: 200
        maxRetryWaitMs: 10000
        jitter: 0.1

  - modelName: voyage-4-lite
    embeddingProvider: VOYAGE
    compatibleModels:
      - voyage-4
      - voyage-4-large
    config:
      modelConfig:
        batchSize: 1000
        batchTokenLimit: 1000000
        outputDimensions: 1024
        quantization: float
      errorHandlingConfig:
        maxRetries: 50
        initialRetryWaitMs: 200
        maxRetryWaitMs: 10000
        jitter: 0.1

  - modelName: voyage-code-3
    embeddingProvider: VOYAGE
    # voyage-code-3 is only compatible with itself (no other models listed)
    config:
      modelConfig:
        batchSize: 1000
        batchTokenLimit: 120000
        outputDimensions: 1024
        quantization: float
      errorHandlingConfig:
        maxRetries: 50
        initialRetryWaitMs: 200
        maxRetryWaitMs: 10000
        jitter: 0.1

  # ---------------------------------------------------------------------------
  # OpenAI-compatible models (OpenAI /v1/embeddings protocol).
  #
  # These route to any server speaking the OpenAI embeddings API: a local engine
  # (Ollama, vLLM, HF TEI) or a cloud endpoint. The default providerEndpoint
  # below targets a local Ollama instance. Set it per-model here (each engine has
  # its own URL); the global `providerEndpoint` in the community embedding config
  # applies to VOYAGE models only and does NOT affect these entries.
  #
  # - No API key is sent unless `credentials.apiKey` is set (keyless local).
  # - Day-1 returns float vectors only.
  # - `outputDimensions` MUST match the model's native dimension: it sizes the
  #   auto-embed index (numDimensions). It is NOT forwarded as the OpenAI
  #   `dimensions` request field (local engines serve a fixed native dimension
  #   and reject it), so it must equal what the model actually returns.
  # ---------------------------------------------------------------------------
  - modelName: bge-m3
    embeddingProvider: OPENAI_COMPATIBLE
    config:
      providerEndpoint: http://localhost:11434/v1/embeddings
      modelConfig:
        batchSize: 96
        batchTokenLimit: 120000
        outputDimensions: 1024
        quantization: float
      errorHandlingConfig:
        maxRetries: 10
        initialRetryWaitMs: 200
        maxRetryWaitMs: 10000
        jitter: 0.1
      credentials: {}

  - modelName: nomic-embed-text
    embeddingProvider: OPENAI_COMPATIBLE
    config:
      providerEndpoint: http://localhost:11434/v1/embeddings
      modelConfig:
        batchSize: 96
        batchTokenLimit: 120000
        outputDimensions: 768
        quantization: float
        # nomic-embed-text needs task-instruction prefixes for good retrieval quality: the query
        # path and the indexing path are embedded differently. The separator (": ") is part of the
        # value. Symmetric models (e.g. OpenAI text-embedding-3) should omit these.
        queryPrefix: "search_query: "
        documentPrefix: "search_document: "
      errorHandlingConfig:
        maxRetries: 10
        initialRetryWaitMs: 200
        maxRetryWaitMs: 10000
        jitter: 0.1
      credentials: {}

  # ---------------------------------------------------------------------------
  # Azure OpenAI via the OPENAI_COMPATIBLE provider (commented example template).
  #
  # Uncomment and fill in your resource/deployment/key to enable. It is left
  # disabled by default because it needs real per-deployment values; without them
  # it would load a non-functional model.
  #
  # Azure hosts the standard OpenAI embedding models (text-embedding-3-small/large,
  # text-embedding-ada-002) but differs from OpenAI in two ways:
  #
  #   1. The endpoint is a per-deployment URL with a required api-version query
  #      parameter (kept here in providerEndpoint, no code change needed):
  #        https://{resource}.openai.azure.com/openai/deployments/{deployment}/embeddings?api-version=2024-02-01
  #   2. Auth uses an `api-key: <key>` request header instead of
  #      `Authorization: Bearer <key>`. Set credentials.authHeaderName to api-key;
  #      the raw key is then sent in that header (no Bearer prefix).
  #
  # authHeaderName defaults to Authorization (Bearer scheme) when omitted, which is
  # what plain OpenAI and most local engines expect.
  #
  # forwardDimensions (optional, default false): when true, outputDimensions is sent as the
  # OpenAI `dimensions` request field for Matryoshka dimension reduction (OpenAI/Azure
  # text-embedding-3 only). Leave false/unset for local engines (Ollama/TEI), which serve a
  # fixed native dimension and reject the field.
  #
  # - modelName: text-embedding-3-small
  #   embeddingProvider: OPENAI_COMPATIBLE
  #   config:
  #     providerEndpoint: https://my-resource.openai.azure.com/openai/deployments/text-embedding-3-small/embeddings?api-version=2024-02-01
  #     modelConfig:
  #       batchSize: 96
  #       batchTokenLimit: 120000
  #       outputDimensions: 1536
  #       quantization: float
  #       forwardDimensions: true
  #     errorHandlingConfig:
  #       maxRetries: 10
  #       initialRetryWaitMs: 200
  #       maxRetryWaitMs: 10000
  #       jitter: 0.1
  #     credentials:
  #       apiKey: "<your-azure-openai-api-key>"
  #       authHeaderName: api-key

syncSource:
  replicaSet:
    hostAndPort:
      - "mongod1:27017"
      - "mongod2:27017"
    scramAuth:
      username: user
      passwordFile: "replicaSet.passwd"
      tls:
        enabled: true
  router:
    hostAndPort: "mongos:27017"
    scramAuth:
      username: user
      passwordFile: "router.passwd"
storage:
  dataPath: "data/mongot"
server:
  grpc:
    address: "localhost:27028"
    tls:
      mode: "mtls"
      certificateKeyFile: "/etc/ssl/common-cert.pem"
      caFile: "/etc/mongot-tls/ca.pem"
metrics:
  enabled: true
  address: "localhost:9946"
healthCheck:
  address: "localhost:8080"
logging:
  verbosity: WARNING
  logPath: "/var/log/mongot"
advancedConfigs:
  ftdc:
    enabled: false
    directorySizeMb: 200
    fileSizeMb: 20
    collectionPeriodMillis: 3000

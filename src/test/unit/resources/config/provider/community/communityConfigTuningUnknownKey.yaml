syncSource:
  replicaSet:
    hostAndPort: "mongod1.internal:27017"
    scramAuth:
      username: "user"
      passwordFile: "/etc/mongot/router.passwd"
      authSource: "admin"
      tls:
        enabled: true
        tlsCertificateKeyFile: "/etc/mongot/tls/client-combined.pem"
        caFile: "/etc/mongot/ca.pem"
storage:
  dataPath: "data/mongot"
server:
  grpc:
    address: "localhost:27028"
advancedConfigs:
  indexing:
    lucene:
      fieldLimit: 500
      unkownKey:
        cache:
          enabled: true
  querying:
    lucene:
      maxClauseLimit: 1024
      # Never configurable in Community. Warned about and ignored.
      disableMaxClauseLimit: true